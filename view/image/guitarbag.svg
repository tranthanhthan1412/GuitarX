<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="bag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Bag body -->
  <path d="M 140 60 Q 100 100 90 200 Q 85 280 120 340 Q 160 370 200 370 Q 240 370 280 340 Q 315 280 310 200 Q 300 100 260 60 Q 220 40 180 40 Q 155 40 140 60 Z" fill="url(#bag)" stroke="#636e72" stroke-width="2"/>
  <!-- Zipper -->
  <path d="M 145 70 Q 110 110 100 200 Q 95 275 125 330" stroke="#B8860B" stroke-width="2.5" fill="none" stroke-dasharray="5 4"/>
  <!-- Pocket -->
  <rect x="155" y="180" width="90" height="70" rx="8" fill="#3d3d3d" stroke="#555" stroke-width="1.5"/>
  <line x1="175" y1="180" x2="175" y2="250" stroke="#B8860B" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Handle -->
  <path d="M 175 50 Q 200 25 225 50" stroke="#555" stroke-width="6" fill="none" stroke-linecap="round"/>
  <text x="200" y="390" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#636e72" font-weight="600">Bao đàn Guitar</text>
</svg>
